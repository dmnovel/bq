<style>
  body {
    margin: 0;
    padding: 16px;
    font-family: system-ui, sans-serif;
    background: #f7f2e8;
    color: #333;
  }

  .top {
    width: min(100%, 500px);
    margin: 0 auto 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1 {
    margin: 0;
    font-size: 22px;
  }

  .reset-btn {
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    background: #8b6f47;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }

  .board {
    width: min(100%, 500px);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .cell {
    min-height: clamp(48px, 11vw, 58px);
    border: none;
    border-radius: clamp(10px, 3vw, 14px);
    background: white;
    font-size: clamp(15px, 4vw, 18px);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    word-break: keep-all;
  }

  .cell.visited {
    background: #fff6d8;
    color: #8b6f47;
  }

  .cell.locked {
    background: #c9f2d0;
    color: #1f7a35;
    cursor: not-allowed;
    box-shadow: none;
  }

  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .modal {
    width: min(88vw, 360px);
    max-height: 86vh;
    overflow-y: auto;
    background: #fffdf8;
    border-radius: 16px;
    padding: clamp(14px, 4vw, 16px);
    text-align: center;
  }

  .modal img {
    max-width: 100%;
    max-height: min(220px, 40vh);
    object-fit: contain;
    border-radius: 10px;
    margin: 8px 0;
  }

  .answer-input {
    width: 90%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 15px;
  }

  .submit-btn,
  .close-btn {
    margin-top: 10px;
    padding: 9px 14px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }

  .submit-btn {
    background: #eee3d1;
  }

  .close-btn {
    background: #333;
    color: white;
  }

  .result {
    min-height: 22px;
    margin-top: 8px;
    font-weight: 700;
  }
</style>
</head>

<div class="top">

const STORAGE_KEY = "fiftyCellQuizGameState";

const board = document.getElementById("board");
const modalBg = document.getElementById("modalBg");
const modalTitle = document.getElementById("modalTitle");
const modalContent = document.getElementById("modalContent");
const result = document.getElementById("result");

let currentNumber = null;
let currentCorrectAnswer = null;

let gameState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

for (let i = 1; i <= 50; i++) {
  const btn = document.createElement("button");
  btn.className = "cell";
  btn.dataset.num = i;

  applyCellState(btn, i);
  btn.addEventListener("click", () => openCell(i));

  board.appendChild(btn);
}

function applyCellState(btn, num) {
  btn.classList.remove("locked", "visited");

  if (gameState[num]?.locked) {
    btn.classList.add("locked");
    btn.textContent = gameState[num].displayText || "정답";
  } else if (gameState[num]?.visited) {
    btn.classList.add("visited");
    btn.textContent = "?";
  } else {
    btn.textContent = num;
  }
}

function normalizeText(text) {
  return String(text).replace(/\s+/g, "").trim();
}

function renderQuestion(text) {
  return String(text || "문제 없음").replace(/\n/g, "<br>");
}

function getQuizData(num) {
  const data = gameData[num] || {};

  return {
    type: data.type || "textQuiz",
    title: data.title || `${num}번 퀴즈`,
    image: data.image || "",
    question: data.question || "문제 없음",
    answer: data.answer || ""
  };
}

function openCell(num) {
  if (gameState[num]?.locked) return;

  currentNumber = num;
  result.textContent = "";
  result.style.color = "";

  const data = getQuizData(num);

  modalTitle.textContent = data.title;
  currentCorrectAnswer = data.answer;

  const questionHtml = renderQuestion(data.question);

  if (data.type === "imageQuiz" && data.image) {
    modalContent.innerHTML = `
      <img src="${data.image}" alt="${data.title}">
      <p>${questionHtml}</p>
      <input id="answerInput" class="answer-input" placeholder="정답 입력" autocomplete="off">
      <br>
      <button class="submit-btn" onclick="submitAnswer()">정답 확인</button>
    `;
  } else {
    modalContent.innerHTML = `
      <p>${questionHtml}</p>
      <input id="answerInput" class="answer-input" placeholder="정답 입력" autocomplete="off">
      <br>
      <button class="submit-btn" onclick="submitAnswer()">정답 확인</button>
    `;
  }

  modalBg.style.display = "flex";

  setTimeout(() => {
    document.getElementById("answerInput")?.focus();
  }, 100);
}

function submitAnswer() {
  const input = document.getElementById("answerInput");
  if (!input || currentNumber === null) return;

  const user = normalizeText(input.value);
  const correct = normalizeText(currentCorrectAnswer);

  if (user === correct) {
    result.textContent = "정답!";
    result.style.color = "green";

    gameState[currentNumber] = {
      locked: true,
      visited: true,
      displayText: currentCorrectAnswer
    };

    saveState();
    updateCurrentCell();

    setTimeout(() => {
      closeModal();
    }, 300);
  } else {
    result.textContent = "오답!";
    result.style.color = "red";
  }
}

function closeModal() {
  if (currentNumber !== null && !gameState[currentNumber]?.locked) {
    gameState[currentNumber] = {
      locked: false,
      visited: true,
      displayText: "?"
    };

    saveState();
    updateCurrentCell();
  }

  modalBg.style.display = "none";
  currentNumber = null;
  currentCorrectAnswer = null;
}

function updateCurrentCell() {
  const btn = document.querySelector(`[data-num='${currentNumber}']`);
  if (btn) applyCellState(btn, currentNumber);
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
}

function resetGame() {
  if (confirm("초기화하시겠습니까?")) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

document.addEventListener("keydown", e => {
  if (modalBg.style.display !== "flex") return;

  if (e.key === "Enter") {
    submitAnswer();
  }

  if (e.key === "Escape") {
    closeModal();
  }
});

modalBg.addEventListener("click", e => {
  if (e.target === modalBg) {
    closeModal();
  }
});
</script>

</body>
</html>
